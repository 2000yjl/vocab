<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WordForge 多语种学习</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./style.css?v=20260611-clean" />
  </head>
  <body>
    <main id="app" class="app">
      <aside class="sidebar">
        <div class="brand">
          <span>WordForge</span>
          <strong>多语种学习</strong>
        </div>
        <nav class="nav" aria-label="主要页面">
          <button class="nav-btn active" data-view="dashboard">首页</button>
          <button class="nav-btn" data-view="learn">学习</button>
          <button class="nav-btn" data-view="grammar">句型</button>
          <button class="nav-btn" data-view="quiz">小测验</button>
          <button class="nav-btn" data-view="mistakes">错词本</button>
        </nav>
        <div class="clock-card">
          <b id="liveClock">--:--</b>
          <span id="timeMood">今日学习场景</span>
        </div>
      </aside>

      <section class="main">
        <header class="topline">
          <div>
            <p class="eyebrow">今天也往前一点</p>
            <h1 id="pageTitle">Dashboard</h1>
          </div>
          <label class="deck-select">
            语言
            <select id="languageSelect"></select>
          </label>
          <label class="deck-select">
            词库
            <select id="deckSelect"></select>
          </label>
        </header>

        <section id="dashboard" class="view active">
          <div class="hero-panel">
            <div>
              <p class="eyebrow">今日任务</p>
              <h2 id="todayHeadline">准备开始今天的学习</h2>
              <p id="todayHint" class="lead"></p>
              <button id="startTodayBtn" class="primary">开始今日学习</button>
            </div>
            <div class="progress-ring">
              <span id="todayProgress">0%</span>
              <small>今日完成</small>
            </div>
          </div>

          <div class="stat-grid">
            <article><span>连续学习</span><strong id="streakDays">0</strong><small>天</small></article>
            <article><span>掌握词数</span><strong id="masteredCount">0</strong><small>个</small></article>
            <article><span>待复习</span><strong id="dueCount">0</strong><small>个</small></article>
            <article><span>错词本</span><strong id="mistakeCount">0</strong><small>个</small></article>
          </div>

          <div class="section-title">
            <h3>全部词库</h3>
            <p>所有内容已开放，按目标选择即可开始。</p>
          </div>
          <div id="deckGrid" class="deck-grid"></div>
        </section>

        <section id="learn" class="view">
          <div class="learn-layout">
            <article id="wordCard" class="word-card"></article>
            <aside class="side-panel">
              <p class="eyebrow">学习节奏</p>
              <h3 id="learnQueueTitle">今日学习</h3>
              <p id="learnQueueHint" class="hint"></p>
              <div class="mini-progress"><span id="learnProgressBar"></span></div>
              <button id="favoriteBtn" class="ghost">收藏</button>
            </aside>
          </div>
        </section>

        <section id="quiz" class="view">
          <div class="quiz-card">
            <div class="quiz-head">
              <p class="eyebrow" id="quizModeLabel">选择题</p>
              <button id="toggleQuizMode" class="ghost">切换拼写题</button>
            </div>
            <h2 id="quizPrompt">准备开始</h2>
            <div id="quizOptions" class="quiz-options"></div>
            <input id="spellInput" class="spell-input hidden" placeholder="输入英文单词" autocomplete="off" />
            <p id="quizFeedback" class="feedback"></p>
            <div class="actions">
              <button id="nextQuizBtn" class="primary">下一题</button>
            </div>
          </div>
        </section>

        <section id="grammar" class="view">
          <div class="section-title">
            <h3>语法句型库</h3>
            <p>把学到的词放进能说出口的结构里。先看句型，再做运用测试。</p>
          </div>
          <div id="grammarList" class="grammar-list"></div>
        </section>

        <section id="mistakes" class="view">
          <div class="section-title">
            <h3>错词本</h3>
            <p>这里不是失败清单，是你的升级路线。优先复习它们，进步会很明显。</p>
          </div>
          <div id="mistakeList" class="mistake-list"></div>
        </section>
      </section>
    </main>

    <script src="./data.js?v=20260611-clean"></script>
    <script src="./app.js?v=20260611-clean"></script>
  </body>
</html>
